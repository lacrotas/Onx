services:
  db:
    image: postgres:17-alpine
    container_name: maxistore_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-maxistore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  server:
    build: ./server
    container_name: maxistore_server
    restart: always
    depends_on:
      - db
    env_file:
      - ./server/.env
    environment:
      # Переопределяем хост БД для работы внутри сети Docker
      - DB_HOST=db
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      # Чтобы загруженные картинки сохранялись на хосте
      - ./server/static:/app/static

  client:
    build: ./client
    container_name: maxistore_client
    restart: always
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  postgres_data: